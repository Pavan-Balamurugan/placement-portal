{% extends "base.html" %}
{% block title %}Company Registration{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-box-wide">

        <h2 class="auth-title">Company Registration</h2>
        <p class="auth-subtitle">Register your company to post placement drives</p>

        <div class="portal-card">
            <form method="POST">

                <div class="form-group">
                    <label class="form-label">Company Name</label>
                    <input type="text" name="company_name" class="form-control"
                           placeholder="e.g. Infosys Ltd." required>
                </div>

                <div class="form-group">
                    <label class="form-label">Official Email</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="hr@company.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="Choose a strong password" required minlength="6">
                </div>

                <div class="form-group">
                    <label class="form-label">HR Contact Number</label>
                    <input type="text" name="hr_contact" class="form-control"
                           placeholder="+91 9876543210" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Company Website</label>
                    <input type="url" name="website" class="form-control"
                           placeholder="https://www.company.com" required>
                </div>

                <div class="alert alert-warning">
                    <i class="bi bi-info-circle"></i>
                    After registration, admin must approve your account before you can log in.
                </div>

                <button type="submit" class="btn-teal w-100 py-2 mt-2">
                    <i class="bi bi-building-add"></i> Register Company
                </button>

            </form>

            <div class="auth-footer">
                Already registered? <a href="{{ url_for('auth.login') }}">Sign In</a>
            </div>
        </div>

    </div>
</div>
{% endblock %}
