{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-box">

        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to your placement portal account</p>

        <div class="portal-card">
            <form method="POST" action="/login">

                <div class="form-group">
                    <label class="form-label">Username / Email</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text" name="identifier" class="form-control"
                               placeholder="admin / student@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" name="password" class="form-control"
                               placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="btn-teal w-100 py-2 mt-2">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>

            </form>

            <div class="auth-footer">
                New here?
                <a href="/register-student">Register as Student</a>
                &nbsp;·&nbsp;
                <a href="/register-company">Register as Company</a>
            </div>
        </div>

    </div>
</div>
{% endblock %}
