{% extends "base.html" %}
{% block title %}Student Registration{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-box">

        <h2 class="auth-title">Student Registration</h2>
        <p class="auth-subtitle">Create your account to start applying for placement drives</p>

        <div class="portal-card">
            <form method="POST">

                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control"
                           placeholder="Your full name" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="student@college.edu" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="Choose a strong password" required minlength="6">
                </div>

                <button type="submit" class="btn-teal w-100 py-2 mt-2">
                    <i class="bi bi-person-plus"></i> Create Account
                </button>

            </form>

            <div class="auth-footer">
                Already registered? <a href="{{ url_for('auth.login') }}">Sign In</a>
            </div>
        </div>

    </div>
</div>
{% endblock %}
