{% extends "base.html" %}
{% block title %}My Profile{% endblock %}

{% block content %}

<div class="page-header">
    <h2><i class="bi bi-person-circle"></i> My Profile</h2>
    <p class="subtitle">Keep your academic details up to date to apply for drives</p>
</div>

<div class="form-card">

    {% if error %}
    <div class="alert alert-danger">
        <i class="bi bi-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <!-- Photo preview -->
    <div class="profile-photo-wrap">
        {% if current_user.photo %}
            <img src="{{ url_for('static', filename='uploads/photos/' + current_user.photo) }}"
                 class="profile-photo" alt="Profile Photo">
        {% else %}
            <div class="profile-photo-placeholder">
                <i class="bi bi-person"></i>
            </div>
        {% endif %}
        <p class="profile-photo-label">Profile Photo</p>
    </div>

    <form method="POST" enctype="multipart/form-data">

        <div class="form-group">
            <label class="form-label">Profile Photo (JPG/PNG)</label>
            <input type="file" name="photo" accept=".jpg,.jpeg,.png" class="form-control">
        </div>

        <div class="form-group">
            <label class="form-label">Department <span class="required-star">*</span></label>
            <select name="department" class="form-select" required>
                <option value="">— Select Department —</option>
                {% for dept in ["CSE", "IT", "CSBS", "DS", "ECE", "EEE", "Civil", "Mech"] %}
                    <option value="{{ dept }}"
                        {% if current_user.department == dept %}selected{% endif %}>
                        {{ dept }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">CGPA <span class="required-star">*</span></label>
                <input type="number" step="0.01" min="0" max="10" name="cgpa"
                       class="form-control" value="{{ current_user.cgpa or '' }}"
                       placeholder="e.g. 8.5" required>
            </div>
            <div class="form-group">
                <label class="form-label">Active Backlogs <span class="required-star">*</span></label>
                <input type="number" min="0" name="backlogs"
                       class="form-control" value="{{ current_user.backlogs or 0 }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">10th Percentage <span class="required-star">*</span></label>
                <input type="number" step="0.01" min="0" max="100" name="tenth_percentage"
                       class="form-control" value="{{ current_user.tenth_percentage or '' }}"
                       placeholder="e.g. 92.5" required>
            </div>
            <div class="form-group">
                <label class="form-label">12th Percentage <span class="required-star">*</span></label>
                <input type="number" step="0.01" min="0" max="100" name="twelfth_percentage"
                       class="form-control" value="{{ current_user.twelfth_percentage or '' }}"
                       placeholder="e.g. 88.0" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">History of Arrears <span class="required-star">*</span></label>
            <select name="arrear_history" class="form-select" required>
                <option value="No" {% if current_user.arrear_history != 'Yes' %}selected{% endif %}>No</option>
                <option value="Yes" {% if current_user.arrear_history == 'Yes' %}selected{% endif %}>Yes</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-teal px-5 py-2">
                <i class="bi bi-save"></i> Save Profile
            </button>
            <a href="{{ url_for('student.student_dashboard') }}" class="btn-outline-teal px-4 py-2">
                Cancel
            </a>
        </div>

    </form>
</div>

{% endblock %}
