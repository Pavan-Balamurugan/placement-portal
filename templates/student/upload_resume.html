{% extends "base.html" %}
{% block title %}Upload Resume{% endblock %}

{% block content %}

<div class="page-header">
    <h2><i class="bi bi-file-earmark-arrow-up"></i> Upload Resume</h2>
    <p class="subtitle">Upload your latest resume — PDF only</p>
</div>

<div class="form-card">

    {% if current_user.resume %}
    <div class="resume-current">
        <i class="bi bi-file-earmark-check"></i>
        Current resume:
        <a href="{{ url_for('static', filename='uploads/resumes/' + current_user.resume) }}"
           target="_blank">View Current Resume</a>
    </div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">

        <div class="form-group">
            <label class="form-label">
                Select PDF File <span class="required-star">*</span>
            </label>
            <input type="file" name="resume" accept=".pdf" class="form-control" required>
            <p class="form-text">Only PDF files are accepted.</p>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-teal px-5 py-2">
                <i class="bi bi-upload"></i> Upload Resume
            </button>
            <a href="{{ url_for('student.student_dashboard') }}" class="btn-outline-teal px-4 py-2">
                Cancel
            </a>
        </div>

    </form>
</div>

{% endblock %}
