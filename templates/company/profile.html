{% extends "base.html" %}
{% block title %}Company Profile{% endblock %}

{% block content %}

<div class="page-header">
    <h2><i class="bi bi-building"></i> Company Profile</h2>
    <p class="subtitle">View and update your company details</p>
</div>

<div class="form-card">

    <form method="POST">

        <div class="form-group">
            <label class="form-label">Company Name <span class="required-star">*</span></label>
            <input type="text" name="company_name" class="form-control"
                   value="{{ current_user.company_name }}" required>
        </div>

        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control"
                   value="{{ current_user.email }}" disabled>
            <p class="form-text">Email cannot be changed.</p>
        </div>

        <div class="form-group">
            <label class="form-label">HR Contact Number</label>
            <input type="text" name="hr_contact" class="form-control"
                   value="{{ current_user.hr_contact or '' }}"
                   placeholder="+91 9876543210">
        </div>

        <div class="form-group">
            <label class="form-label">Company Website</label>
            <input type="url" name="website" class="form-control"
                   value="{{ current_user.website or '' }}"
                   placeholder="https://www.company.com">
        </div>

        <div class="form-group">
            <label class="form-label">Approval Status</label>
            <div>
                <span class="status-pill
                    {% if current_user.approval_status == 'Approved' %}badge-approved
                    {% elif current_user.approval_status == 'Rejected' %}badge-rejected
                    {% else %}badge-pending{% endif %}">
                    {{ current_user.approval_status }}
                </span>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-teal px-5 py-2">
                <i class="bi bi-save"></i> Save Changes
            </button>
            <a href="{{ url_for('company.company_dashboard') }}" class="btn-outline-teal px-4 py-2">
                Cancel
            </a>
        </div>

    </form>
</div>

{% endblock %}
